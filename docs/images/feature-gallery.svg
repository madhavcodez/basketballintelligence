<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 780" width="1200" height="780" role="img" aria-label="Feature gallery — hot zones, player lab, radar comparison, ask the data, lineup lab, film room">
  <defs>
    <filter id="g-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.07"/>
    </filter>
  </defs>
  <rect width="1200" height="780" fill="#F5F5F7"/>

  <!-- ══════════ HOT ZONES ══════════ -->
  <g transform="translate(20, 20)" filter="url(#g-shadow)">
    <rect width="380" height="360" rx="20" fill="#FFFFFF"/>
  </g>
  <g transform="translate(40, 48)" font-family="'Inter', system-ui, sans-serif">
    <text font-size="11" font-weight="700" fill="#FF6B35" letter-spacing="1.6">HOT ZONES</text>
    <text y="22" font-size="20" font-weight="700" fill="#1D1D1F">14-zone efficiency map</text>
    <text y="42" font-size="12" fill="#6E6E73">vs. league average · colour-coded</text>
  </g>
  <g transform="translate(60, 120)">
    <svg width="300" height="240" viewBox="0 0 500 400">
      <rect width="500" height="400" fill="#FAFAFA" stroke="#DDD" stroke-width="1.5"/>
      <!-- 14-zone polygons with efficiency tint -->
      <!-- Restricted -->
      <path d="M 210 52 A 40 40 0 0 1 290 52 L 290 0 L 210 0 Z" fill="#FF3D00" opacity="0.85"/>
      <!-- Paint non-RA -->
      <path d="M 170 0 L 170 190 L 330 190 L 330 0 L 290 0 A 40 40 0 0 0 210 0 Z" fill="#FFB199" opacity="0.75"/>
      <!-- Left corner 3 -->
      <rect x="0" y="0" width="30" height="142" fill="#FF6B35" opacity="0.82"/>
      <!-- Right corner 3 -->
      <rect x="470" y="0" width="30" height="142" fill="#FF6B35" opacity="0.82"/>
      <!-- Left wing 3 -->
      <path d="M 30 142 A 237 237 0 0 1 130 0 L 30 0 Z" fill="#8EC2F6" opacity="0.7"/>
      <!-- Top of key 3 -->
      <path d="M 130 0 L 370 0 A 237 237 0 0 0 250 23 A 237 237 0 0 0 130 0 Z" fill="#FFB199" opacity="0.7"/>
      <!-- Right wing 3 -->
      <path d="M 370 0 A 237 237 0 0 1 470 142 L 470 0 Z" fill="#8EC2F6" opacity="0.7"/>
      <!-- Left mid range -->
      <path d="M 30 142 L 170 142 L 170 190 A 237 237 0 0 1 30 190 Z" fill="#BDD8F4" opacity="0.65"/>
      <!-- Right mid range -->
      <path d="M 470 142 L 330 142 L 330 190 A 237 237 0 0 0 470 190 Z" fill="#BDD8F4" opacity="0.65"/>
      <!-- Court lines overlay -->
      <rect x="0" y="0" width="500" height="400" fill="none" stroke="#333" stroke-width="1.5"/>
      <rect x="170" y="0" width="160" height="190" fill="none" stroke="#333" stroke-width="1.5"/>
      <circle cx="250" cy="190" r="60" fill="none" stroke="#333" stroke-width="1.5"/>
      <line x1="220" y1="40" x2="280" y2="40" stroke="#333" stroke-width="2"/>
      <circle cx="250" cy="52.5" r="9" fill="none" stroke="#FF6B35" stroke-width="2"/>
      <line x1="30" y1="0" x2="30" y2="142" stroke="#333" stroke-width="1.5"/>
      <line x1="470" y1="0" x2="470" y2="142" stroke="#333" stroke-width="1.5"/>
      <path d="M 30 142 A 237.5 237.5 0 0 1 470 142" fill="none" stroke="#333" stroke-width="1.5"/>
    </svg>
  </g>

  <!-- ══════════ PLAYER LAB — career arc ══════════ -->
  <g transform="translate(420, 20)" filter="url(#g-shadow)">
    <rect width="380" height="360" rx="20" fill="#FFFFFF"/>
  </g>
  <g transform="translate(440, 48)" font-family="'Inter', system-ui, sans-serif">
    <text font-size="11" font-weight="700" fill="#FF6B35" letter-spacing="1.6">PLAYER LAB</text>
    <text y="22" font-size="20" font-weight="700" fill="#1D1D1F">Career arc · peak detection</text>
    <text y="42" font-size="12" fill="#6E6E73">Points per game · rookie → retirement</text>
  </g>
  <!-- Career arc chart -->
  <g transform="translate(440, 110)" font-family="'Inter', system-ui, sans-serif">
    <!-- Axes -->
    <line x1="0" y1="230" x2="340" y2="230" stroke="#DDD" stroke-width="1"/>
    <line x1="0" y1="10" x2="0" y2="230" stroke="#DDD" stroke-width="1"/>
    <!-- Gridlines -->
    <line x1="0" y1="180" x2="340" y2="180" stroke="#F5F5F7" stroke-width="1"/>
    <line x1="0" y1="130" x2="340" y2="130" stroke="#F5F5F7" stroke-width="1"/>
    <line x1="0" y1="80" x2="340" y2="80" stroke="#F5F5F7" stroke-width="1"/>
    <line x1="0" y1="30" x2="340" y2="30" stroke="#F5F5F7" stroke-width="1"/>
    <!-- Data path (PPG over seasons) -->
    <path d="M 10 180 L 40 160 L 70 130 L 100 100 L 130 70 L 160 45 L 190 35 L 220 55 L 250 80 L 280 110 L 310 145 L 330 170" fill="none" stroke="#FF6B35" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Area fill -->
    <path d="M 10 180 L 40 160 L 70 130 L 100 100 L 130 70 L 160 45 L 190 35 L 220 55 L 250 80 L 280 110 L 310 145 L 330 170 L 330 230 L 10 230 Z" fill="#FF6B35" opacity="0.12"/>
    <!-- Peak marker -->
    <circle cx="190" cy="35" r="6" fill="#FFFFFF" stroke="#FF6B35" stroke-width="3"/>
    <rect x="160" y="0" width="90" height="24" rx="6" fill="#1D1D1F"/>
    <text x="205" y="16" fill="#FFFFFF" font-size="10" font-weight="600" text-anchor="middle">PEAK · 31.4</text>
    <!-- Milestone markers -->
    <circle cx="70" cy="130" r="4" fill="#0071E3"/>
    <circle cx="160" cy="45" r="4" fill="#A78BFA"/>
    <circle cx="280" cy="110" r="4" fill="#FBBF24"/>
    <!-- x-axis labels -->
    <text x="10" y="248" font-size="9" fill="#86868B">Y1</text>
    <text x="100" y="248" font-size="9" fill="#86868B">Y4</text>
    <text x="190" y="248" font-size="9" fill="#86868B">Y7</text>
    <text x="280" y="248" font-size="9" fill="#86868B">Y10</text>
    <text x="330" y="248" font-size="9" fill="#86868B">Y12</text>
    <!-- legend -->
    <g transform="translate(0, 265)" font-size="10" fill="#6E6E73">
      <circle cx="4" cy="0" r="3" fill="#0071E3"/>
      <text x="12" y="3">All-Star</text>
      <circle cx="76" cy="0" r="3" fill="#A78BFA"/>
      <text x="84" y="3">MVP</text>
      <circle cx="128" cy="0" r="3" fill="#FBBF24"/>
      <text x="136" y="3">Ring</text>
    </g>
  </g>

  <!-- ══════════ RADAR COMPARE ══════════ -->
  <g transform="translate(820, 20)" filter="url(#g-shadow)">
    <rect width="360" height="360" rx="20" fill="#FFFFFF"/>
  </g>
  <g transform="translate(840, 48)" font-family="'Inter', system-ui, sans-serif">
    <text font-size="11" font-weight="700" fill="#FF6B35" letter-spacing="1.6">COMPARE</text>
    <text y="22" font-size="20" font-weight="700" fill="#1D1D1F">8-axis radar overlay</text>
    <text y="42" font-size="12" fill="#6E6E73">Jordan vs. LeBron · per-game deltas</text>
  </g>
  <g transform="translate(1000, 220)" font-family="'Inter', system-ui, sans-serif">
    <!-- Radar polygon: 8 axes -->
    <!-- Grid rings -->
    <g opacity="0.4">
      <polygon points="0,-120 84,-84 120,0 84,84 0,120 -84,84 -120,0 -84,-84" fill="none" stroke="#DDD" stroke-width="1"/>
      <polygon points="0,-90 63,-63 90,0 63,63 0,90 -63,63 -90,0 -63,-63" fill="none" stroke="#DDD" stroke-width="1"/>
      <polygon points="0,-60 42,-42 60,0 42,42 0,60 -42,42 -60,0 -42,-42" fill="none" stroke="#DDD" stroke-width="1"/>
      <polygon points="0,-30 21,-21 30,0 21,21 0,30 -21,21 -30,0 -21,-21" fill="none" stroke="#DDD" stroke-width="1"/>
    </g>
    <!-- Axes -->
    <g stroke="#DDD" stroke-width="1" opacity="0.5">
      <line x1="0" y1="0" x2="0" y2="-120"/>
      <line x1="0" y1="0" x2="84" y2="-84"/>
      <line x1="0" y1="0" x2="120" y2="0"/>
      <line x1="0" y1="0" x2="84" y2="84"/>
      <line x1="0" y1="0" x2="0" y2="120"/>
      <line x1="0" y1="0" x2="-84" y2="84"/>
      <line x1="0" y1="0" x2="-120" y2="0"/>
      <line x1="0" y1="0" x2="-84" y2="-84"/>
    </g>
    <!-- Player A (orange) -->
    <polygon points="0,-112 78,-78 108,0 72,72 0,78 -60,60 -84,0 -54,-54" fill="#FF6B35" fill-opacity="0.35" stroke="#FF6B35" stroke-width="2"/>
    <!-- Player B (blue) -->
    <polygon points="0,-100 66,-66 114,0 78,78 0,102 -72,72 -96,0 -66,-66" fill="#0071E3" fill-opacity="0.3" stroke="#0071E3" stroke-width="2"/>
    <!-- Axis labels -->
    <g font-size="9" fill="#6E6E73" text-anchor="middle">
      <text x="0" y="-130">PTS</text>
      <text x="100" y="-92">AST</text>
      <text x="138" y="4">REB</text>
      <text x="100" y="100">STL</text>
      <text x="0" y="142">BLK</text>
      <text x="-100" y="100">FG%</text>
      <text x="-138" y="4">3P%</text>
      <text x="-100" y="-92">FT%</text>
    </g>
  </g>
  <!-- Legend -->
  <g transform="translate(840, 92)" font-family="'Inter', system-ui, sans-serif" font-size="11">
    <rect width="12" height="12" rx="2" fill="#FF6B35"/>
    <text x="18" y="10" fill="#1D1D1F" font-weight="500">Jordan · 30.1 PPG</text>
    <g transform="translate(160, 0)">
      <rect width="12" height="12" rx="2" fill="#0071E3"/>
      <text x="18" y="10" fill="#1D1D1F" font-weight="500">LeBron · 27.2 PPG</text>
    </g>
  </g>

  <!-- ══════════ ASK THE DATA ══════════ -->
  <g transform="translate(20, 400)" filter="url(#g-shadow)">
    <rect width="380" height="360" rx="20" fill="#FFFFFF"/>
  </g>
  <g transform="translate(40, 428)" font-family="'Inter', system-ui, sans-serif">
    <text font-size="11" font-weight="700" fill="#A78BFA" letter-spacing="1.6">ASK THE DATA</text>
    <text y="22" font-size="20" font-weight="700" fill="#1D1D1F">Natural language → SQL</text>
    <text y="42" font-size="12" fill="#6E6E73">Gemini translates questions into safe SELECTs</text>
  </g>
  <!-- Chat bubble -->
  <g transform="translate(40, 490)" font-family="'Inter', system-ui, sans-serif">
    <rect width="340" height="58" rx="14" fill="#F5F5F7"/>
    <text x="16" y="20" font-size="10" font-weight="700" fill="#86868B" letter-spacing="1.2">USER</text>
    <text x="16" y="40" font-size="12" fill="#1D1D1F">Who had the most 30-point games</text>
    <text x="16" y="54" font-size="12" fill="#1D1D1F">in the 2020 playoffs?</text>
  </g>
  <!-- SQL code -->
  <g transform="translate(40, 560)" font-family="'JetBrains Mono', 'SF Mono', monospace">
    <rect width="340" height="100" rx="14" fill="#1D1D1F"/>
    <text x="16" y="24" font-size="10" font-weight="700" fill="#A78BFA" letter-spacing="1.2">GENERATED SQL</text>
    <text x="16" y="46" font-size="11" fill="#8EC2F6">SELECT</text>
    <text x="72" y="46" font-size="11" fill="#FFFFFF">player, COUNT(*) AS g30</text>
    <text x="16" y="62" font-size="11" fill="#8EC2F6">FROM</text>
    <text x="60" y="62" font-size="11" fill="#FFFFFF">playoff_game_logs</text>
    <text x="16" y="78" font-size="11" fill="#8EC2F6">WHERE</text>
    <text x="68" y="78" font-size="11" fill="#FFFFFF">season=2020 AND pts &gt;= 30</text>
    <text x="16" y="94" font-size="11" fill="#8EC2F6">GROUP BY</text>
    <text x="88" y="94" font-size="11" fill="#FFFFFF">player ORDER BY g30 DESC</text>
  </g>
  <!-- Result chip -->
  <g transform="translate(40, 672)" font-family="'Inter', system-ui, sans-serif">
    <rect width="340" height="66" rx="14" fill="#FFF7ED" stroke="#FFB199"/>
    <text x="16" y="22" font-size="10" font-weight="700" fill="#FF6B35" letter-spacing="1.2">RESULT</text>
    <text x="16" y="42" font-size="13" font-weight="600" fill="#1D1D1F">Jimmy Butler · 11 games</text>
    <text x="16" y="58" font-size="11" fill="#6E6E73">+3 over LeBron · Bubble run</text>
  </g>

  <!-- ══════════ LINEUP LAB ══════════ -->
  <g transform="translate(420, 400)" filter="url(#g-shadow)">
    <rect width="380" height="360" rx="20" fill="#FFFFFF"/>
  </g>
  <g transform="translate(440, 428)" font-family="'Inter', system-ui, sans-serif">
    <text font-size="11" font-weight="700" fill="#FF6B35" letter-spacing="1.6">LINEUP LAB</text>
    <text y="22" font-size="20" font-weight="700" fill="#1D1D1F">5-man chemistry</text>
    <text y="42" font-size="12" fill="#6E6E73">24,000+ combinations · net rating</text>
  </g>
  <!-- Player chip row -->
  <g transform="translate(440, 490)" font-family="'Inter', system-ui, sans-serif">
    <g>
      <circle cx="26" cy="26" r="22" fill="#FFB199"/>
      <text x="26" y="30" font-size="12" font-weight="700" fill="#1D1D1F" text-anchor="middle">SC</text>
      <text x="26" y="62" font-size="9" fill="#6E6E73" text-anchor="middle">Curry</text>
    </g>
    <g transform="translate(60, 0)">
      <circle cx="26" cy="26" r="22" fill="#8EC2F6"/>
      <text x="26" y="30" font-size="12" font-weight="700" fill="#1D1D1F" text-anchor="middle">KT</text>
      <text x="26" y="62" font-size="9" fill="#6E6E73" text-anchor="middle">Thompson</text>
    </g>
    <g transform="translate(120, 0)">
      <circle cx="26" cy="26" r="22" fill="#FF9B6B"/>
      <text x="26" y="30" font-size="12" font-weight="700" fill="#1D1D1F" text-anchor="middle">AI</text>
      <text x="26" y="62" font-size="9" fill="#6E6E73" text-anchor="middle">Iguodala</text>
    </g>
    <g transform="translate(180, 0)">
      <circle cx="26" cy="26" r="22" fill="#BDD8F4"/>
      <text x="26" y="30" font-size="12" font-weight="700" fill="#1D1D1F" text-anchor="middle">DG</text>
      <text x="26" y="62" font-size="9" fill="#6E6E73" text-anchor="middle">Green</text>
    </g>
    <g transform="translate(240, 0)">
      <circle cx="26" cy="26" r="22" fill="#FFD6BF"/>
      <text x="26" y="30" font-size="12" font-weight="700" fill="#1D1D1F" text-anchor="middle">AB</text>
      <text x="26" y="62" font-size="9" fill="#6E6E73" text-anchor="middle">Bogut</text>
    </g>
  </g>
  <!-- Net rating bar -->
  <g transform="translate(440, 580)" font-family="'Inter', system-ui, sans-serif">
    <text font-size="10" font-weight="700" fill="#6E6E73" letter-spacing="1.2">NET RATING</text>
    <text y="24" font-size="30" font-weight="800" fill="#34D399">+23.5</text>
    <text x="100" y="24" font-size="11" fill="#6E6E73">per 100 possessions</text>
    <!-- Bar track -->
    <g transform="translate(0, 38)">
      <rect width="340" height="10" rx="5" fill="#F5F5F7"/>
      <rect width="260" height="10" rx="5" fill="#34D399"/>
    </g>
    <g transform="translate(0, 60)" font-size="10" fill="#6E6E73">
      <text>O-RTG 118.2</text>
      <text x="100">D-RTG 94.7</text>
      <text x="200">MIN played 612</text>
    </g>
  </g>
  <!-- Usage chips -->
  <g transform="translate(440, 670)" font-family="'Inter', system-ui, sans-serif">
    <rect width="340" height="72" rx="12" fill="#F5F5F7"/>
    <text x="16" y="22" font-size="10" font-weight="700" fill="#86868B" letter-spacing="1.2">USAGE DISTRIBUTION</text>
    <rect x="16" y="32" width="80" height="18" rx="4" fill="#FF6B35"/>
    <rect x="100" y="32" width="64" height="18" rx="4" fill="#0071E3"/>
    <rect x="168" y="32" width="40" height="18" rx="4" fill="#A78BFA"/>
    <rect x="212" y="32" width="48" height="18" rx="4" fill="#FBBF24"/>
    <rect x="264" y="32" width="50" height="18" rx="4" fill="#34D399"/>
    <g font-size="9" fill="#6E6E73">
      <text x="16" y="62">26% SC</text>
      <text x="100" y="62">22% KT</text>
      <text x="168" y="62">14% AI</text>
      <text x="212" y="62">16% DG</text>
      <text x="264" y="62">17% AB</text>
    </g>
  </g>

  <!-- ══════════ FILM ROOM ══════════ -->
  <g transform="translate(820, 400)" filter="url(#g-shadow)">
    <rect width="360" height="360" rx="20" fill="#FFFFFF"/>
  </g>
  <g transform="translate(840, 428)" font-family="'Inter', system-ui, sans-serif">
    <text font-size="11" font-weight="700" fill="#FF6B35" letter-spacing="1.6">FILM ROOM</text>
    <text y="22" font-size="20" font-weight="700" fill="#1D1D1F">Computer-vision pipeline</text>
    <text y="42" font-size="12" fill="#6E6E73">YOLO detect · classify · align to PBP</text>
  </g>
  <!-- Mini court with YOLO boxes -->
  <g transform="translate(840, 490)">
    <rect width="320" height="180" rx="12" fill="#1D1D1F"/>
    <!-- Court outline -->
    <g stroke="#FF6B35" stroke-width="1" fill="none" opacity="0.35">
      <rect x="20" y="18" width="280" height="144" rx="4"/>
      <line x1="160" y1="18" x2="160" y2="162"/>
      <circle cx="160" cy="90" r="20"/>
    </g>
    <!-- YOLO detection boxes -->
    <g font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="8" font-weight="700">
      <rect x="60" y="52" width="26" height="46" fill="none" stroke="#34D399" stroke-width="1.5"/>
      <rect x="60" y="44" width="48" height="10" fill="#34D399"/>
      <text x="64" y="52" fill="#1D1D1F">player 0.94</text>

      <rect x="120" y="70" width="26" height="46" fill="none" stroke="#34D399" stroke-width="1.5"/>
      <rect x="120" y="62" width="48" height="10" fill="#34D399"/>
      <text x="124" y="70" fill="#1D1D1F">player 0.91</text>

      <rect x="190" y="58" width="26" height="46" fill="none" stroke="#34D399" stroke-width="1.5"/>
      <rect x="190" y="50" width="48" height="10" fill="#34D399"/>
      <text x="194" y="58" fill="#1D1D1F">player 0.88</text>

      <rect x="154" y="88" width="12" height="12" fill="none" stroke="#FF6B35" stroke-width="1.5"/>
      <rect x="154" y="80" width="28" height="10" fill="#FF6B35"/>
      <text x="158" y="88" fill="#1D1D1F">ball 0.82</text>

      <rect x="246" y="62" width="18" height="26" fill="none" stroke="#FBBF24" stroke-width="1.5"/>
      <rect x="246" y="54" width="36" height="10" fill="#FBBF24"/>
      <text x="250" y="62" fill="#1D1D1F">hoop 0.99</text>
    </g>
  </g>
  <!-- Clip metadata -->
  <g transform="translate(840, 685)" font-family="'Inter', system-ui, sans-serif">
    <rect width="320" height="56" rx="10" fill="#F5F5F7"/>
    <text x="14" y="20" font-size="10" font-weight="700" fill="#FF6B35" letter-spacing="1.2">CLIP · Q4 2:47</text>
    <text x="14" y="38" font-size="12" font-weight="600" fill="#1D1D1F">Pick-and-roll → Corner 3</text>
    <text x="14" y="52" font-size="10" fill="#6E6E73">BOS 82 · MIL 81 · Tatum assist</text>
  </g>
</svg>
